<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>OSH-C Portal — Asbenz Motors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <a class="brand" href="/" data-navigate="/">
      <div class="logo"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 5-3 8.5-7 10-4-1.5-7-5-7-10V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg></div>
      <div>
        <h1>OSH-C Portal</h1>
        <div class="sub">Asbenz Motors</div>
      </div>
    </a>
    <nav class="side-nav">
      <a href="/" data-navigate="/" data-route="/" class="active">Dashboard</a>
      <a href="/admin.html" id="adminLink" class="hidden">Admin</a>
    </nav>
    <div class="side-footer" id="profileWrap" style="position:relative;">
      <div class="row" id="profileBtn">
        <div class="avatar" id="avatarInitials">--</div>
        <div class="who">
          <div class="pname" id="profileName">—</div>
          <div class="prole" id="profileRole">—</div>
        </div>
      </div>
      <div id="profileMenu" class="hidden" style="position:absolute;left:0;right:0;bottom:52px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px;z-index:60;">
        <button class="btn ghost block small" id="changePwBtn" style="justify-content:flex-start;">Change password</button>
        <button class="btn ghost block small" id="logoutBtn" style="justify-content:flex-start;color:var(--danger);">Sign out</button>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="page" id="view"><div class="page-loading">Loading…</div></div>
  </main>
</div>

<!-- Modal / detail overlay -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">—</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/modules.config.js"></script>
<script src="/js/router.js"></script>
<script src="/js/components/cards.js"></script>
<script src="/js/components/table.js"></script>
<script src="/js/components/tabs.js"></script>
<script src="/js/components/accordion.js"></script>
<script src="/js/components/breadcrumb.js"></script>
<script src="/js/components/activityFeed.js"></script>
<script src="/js/services/linkedTableService.js"></script>
<script src="/js/services/reportEngine.js"></script>
<script src="/js/framework/moduleFramework.js"></script>
<script src="/js/pages/machinery.module.js"></script>
<script src="/js/pages/chemical.module.js"></script>
<script src="/js/pages/chemicalCockpit.js"></script>
<script src="/js/pages/actions.module.js"></script>
<script src="/js/pages/oshCommittee.module.js"></script>
<script src="/js/pages/oshCommitteeMembers.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/app.js"></script>
