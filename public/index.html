<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>OSH-C Portal — Asbenz Motors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <a class="brand" href="/index.html">
      <div class="logo"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 5-3 8.5-7 10-4-1.5-7-5-7-10V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg></div>
      <div>
        <h1>OSH-C Portal</h1>
        <div class="sub">Asbenz Motors</div>
      </div>
    </a>
    <nav class="side-nav">
      <a href="/index.html" class="active">Dashboard</a>
      <a href="/admin.html" id="adminLink" class="hidden">Admin</a>
    </nav>
    <div class="side-footer" id="profileWrap" style="position:relative;">
      <div class="row" id="profileBtn">
        <div class="avatar" id="avatarInitials">--</div>
        <div class="who">
          <div class="pname" id="profileName">—</div>
          <div class="prole" id="profileRole">—</div>
        </div>
      </div>
      <div id="profileMenu" class="hidden" style="position:absolute;left:0;right:0;bottom:52px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px;z-index:60;">
        <button class="btn ghost block small" id="changePwBtn" style="justify-content:flex-start;">Change password</button>
        <button class="btn ghost block small" id="logoutBtn" style="justify-content:flex-start;color:var(--danger);">Sign out</button>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="page">
      <div class="page-head">
        <div class="eyebrow">Occupational Safety &amp; Health Committee</div>
        <h1 id="greeting">Good day 👋</h1>
        <p>Track machinery, CHRA, HRA, HIRARC and SOP compliance across the Asbenz Motors workshop.</p>
        <span class="snapshot" id="snapshotTime"></span>
      </div>

      <div class="section-head"><h2>Modules</h2><span class="hint">Tap a tile to view records</span></div>
      <div class="grid" id="moduleGrid"></div>

      <div class="section-head"><h2>Compliance Overview</h2></div>
      <div class="stats" id="statGrid"></div>
    </div>
  </main>
</div>

<!-- Modal / detail overlay -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">—</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/modules.config.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
